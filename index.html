<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер привычек</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <h1>📊 Трекер привычек</h1>
            <button id="theme-toggle" class="btn-theme">🌙 Темная тема</button>
        </header>

        <section class="card">
            <h2>Добавить новую привычку</h2>
            <form id="habit-form">
                <input type="text" id="habit-input" placeholder="Например: Пить 2л воды" required>
                <button type="submit" class="btn-success">Добавить</button>
            </form>
            <div id="error-message" class="error-text"></div>
        </section>

        <section class="card">
            <h2>🏆 Топ успешных привычек</h2>
            <div id="top-habits">Ни одной привычки пока не добавлено.</div>
        </section>

        <section class="card">
            <h2>📅 Мои привычки (За последние 7 дней)</h2>
            <div id="habits-list"></div>
        </section>
    </div>

    <div id="calendar-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-habit-name">Календарь привычки</h2>
            <h3 id="modal-month-title">Май 2026</h3>
            
            <div class="month-grid-header">
                <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
            </div>
            <div id="month-grid" class="month-grid"></div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="tracker.js"></script>
    <script src="app.js"></script>
</body>
</html>
